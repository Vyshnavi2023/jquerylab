<!DOCTYPE html>
<html>
<head>
    <title>jQuery Attributes</title>

    <link rel="stylesheet" href="styles.css">

    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <!-- JS -->
    <script src="script.js"></script>
</head>

<body>

    <h1>Attribute Methods</h1>

    <!-- Image -->
    <img id="img" src="https://via.placeholder.com/150" width="150">

    <br><br>

    <!-- Input -->
    <input type="text" id="name" placeholder="Enter name">

    <br><br>

    <!-- Checkbox -->
    <input type="checkbox" id="check"> Accept Terms

    <br><br>

    <!-- Buttons -->
    <button id="changeImg">Change Image</button>
    <button id="removePlaceholder">Remove Placeholder</button>
    <button id="disableCheck">Disable Checkbox</button>
    <button id="getValue">Get Input Value</button>

</body>
</html>
